name: OWASP Dependency-Check

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.owasp/dependency-check
          key: owasp-depcheck-${{ runner.os }}-${{ hashFiles('build.gradle*', 'gradle.properties') }}
          restore-keys: |
            owasp-depcheck-${{ runner.os }}-

      - name: Download OWASP Dependency-Check CLI
        run: |
          OWASP_VERSION=$(curl -s https://dependency-check.github.io/DependencyCheck/current.txt)
          echo "Downloading OWASP Dependency-Check v${OWASP_VERSION}..."
          curl -sL "https://github.com/dependency-check/DependencyCheck/releases/download/v${OWASP_VERSION}/dependency-check-${OWASP_VERSION}-release.zip" -o /tmp/owasp-dc.zip
          ls -la /tmp/owasp-dc.zip
          unzip -q /tmp/owasp-dc.zip -d /opt
          ls -la /opt/dependency-check/bin/
          echo "/opt/dependency-check/bin" >> $GITHUB_PATH

      - name: Grant execute permission
        run: chmod +x /opt/dependency-check/bin/dependency-check.sh

      - name: Run OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          dependency-check.sh \
            --project "Windfall Fabric" \
            --scan . \
            --exclude ".git" \
            --exclude ".cache" \
            --format HTML \
            --format JSON \
            --nvdApiKey "$NVD_API_KEY" \
            --data ~/.owasp/dependency-check \
            || true
        continue-on-error: true

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: owasp-report
          path: |
            dependency-check-report.html
            dependency-check-report.json
          if-no-files-found: warn
